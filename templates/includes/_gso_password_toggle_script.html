<script>
(function() {
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('.gso-password-toggle');
        if (!btn) return;
        var wrap = btn.closest('.gso-password-field-wrap');
        if (!wrap) return;
        var input = wrap.querySelector('input');
        if (!input) return;
        e.preventDefault();
        var icon = btn.querySelector('.gso-password-toggle-icon');
        var show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        if (icon) icon.textContent = show ? 'visibility_off' : 'visibility';
        var hideLabel = 'Hide password';
        var showLabel = 'Show password';
        btn.setAttribute('aria-label', show ? hideLabel : showLabel);
        btn.setAttribute('title', show ? hideLabel : showLabel);
    });
})();
</script>
