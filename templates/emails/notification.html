<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GSO Notification</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,sans-serif;color:#0f172a;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fb;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="background:linear-gradient(90deg,#1152d4,#2f6cf0);padding:18px 20px;color:#ffffff;font-size:18px;font-weight:700;">
              GSO Notification
            </td>
          </tr>
          <tr>
            <td style="padding:20px;">
              <p style="margin:0 0 12px 0;font-size:14px;color:#334155;">Hi {{ user.get_full_name|default:user.username }},</p>
              <h2 style="margin:0 0 12px 0;font-size:20px;line-height:1.3;color:#0f172a;">{{ title }}</h2>
              <p style="margin:0 0 16px 0;font-size:14px;line-height:1.6;color:#334155;">{{ message }}</p>
              {% if link %}
              <a href="{{ link }}" style="display:inline-block;background:#1152d4;color:#ffffff;text-decoration:none;padding:10px 14px;border-radius:8px;font-size:14px;font-weight:700;">
                View details
              </a>
              {% endif %}
            </td>
          </tr>
          <tr>
            <td style="padding:14px 20px;background:#f8fafc;border-top:1px solid #e2e8f0;font-size:12px;color:#64748b;">
              General Services Office
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
