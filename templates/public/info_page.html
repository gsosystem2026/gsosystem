<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{ info_title }} — GSO</title>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'Public Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
<header class="border-b border-slate-200 bg-white px-6 md:px-10 py-4">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
        <a href="{% url 'gso_accounts:login' %}" class="flex items-center gap-3 text-primary">
            <span class="size-9 rounded-lg bg-primary/10 flex items-center justify-center overflow-hidden">
                <img src="{% static 'img/logo/gso_logo.png' %}" alt="GSO logo" class="w-7 h-7 object-contain">
            </span>
            <span class="font-bold text-slate-900">GSO Request Management</span>
        </a>
        <a href="{% url 'gso_accounts:login' %}" class="text-sm font-medium text-slate-600 hover:text-primary">Back to Login</a>
    </div>
</header>
<main class="px-6 md:px-10 py-10">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 md:px-8 py-6 border-b border-slate-200 bg-slate-50">
            <h1 class="text-2xl md:text-3xl font-bold">{{ info_title }}</h1>
            <p class="mt-2 text-sm text-slate-600">{{ info_description }}</p>
            <p class="mt-1 text-xs text-slate-500">Last updated: {{ info_updated }}</p>
        </div>
        <div class="px-6 md:px-8 py-6 space-y-6">
            {% for section in info_sections %}
            <section>
                <h2 class="text-lg font-semibold">{{ section.heading }}</h2>
                <p class="mt-2 text-sm leading-6 text-slate-600">{{ section.body }}</p>
            </section>
            {% endfor %}
        </div>
    </div>
</main>
</body>
</html>
