{% extends "layouts/base_staff.html" %}
{% block staff_content %}
<div class="max-w-2xl mx-auto">
    <div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm p-6">
        <h1 class="text-xl font-bold text-slate-900 dark:text-slate-100 mb-4">Edit Profile</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="flex gap-3">
                <button type="submit" class="px-4 py-2 rounded-lg bg-primary text-white font-semibold">Save changes</button>
                <a href="{% url 'gso_accounts:staff_dashboard' %}" class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
