<form id="editUserForm" method="post" action="{% url 'gso_accounts:staff_account_user_edit' user_obj.pk %}" class="space-y-4" data-no-loading="1">
    {% csrf_token %}
    <input type="hidden" name="ajax" value="1" />
    <p id="editUserNonFieldError" class="hidden text-sm text-red-600 dark:text-red-400"></p>

    <div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1">Username</label>
        {{ form.username }}
        <p id="editUserErr_username" class="hidden text-xs text-red-600 dark:text-red-400 mt-1"></p>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1">First name</label>
            {{ form.first_name }}
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1">Last name</label>
            {{ form.last_name }}
        </div>
    </div>
    <div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1">Email</label>
        {{ form.email }}
        <p id="editUserErr_email" class="hidden text-xs text-red-600 dark:text-red-400 mt-1"></p>
    </div>
    <div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1">Role <span class="text-red-500">*</span></label>
        {{ form.role }}
        <p id="editUserErr_role" class="hidden text-xs text-red-600 dark:text-red-400 mt-1"></p>
    </div>
    <div id="editUserUnitWrap">
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1">Unit <span class="text-red-500">*</span> <span class="normal-case text-[11px] text-slate-500 dark:text-slate-400">(for Unit Head/Personnel)</span></label>
        {{ form.unit }}
        <p id="editUserErr_unit" class="hidden text-xs text-red-600 dark:text-red-400 mt-1"></p>
    </div>
    <div id="editUserOfficeWrap">
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1">Office/Department <span class="text-red-500">*</span> <span class="normal-case text-[11px] text-slate-500 dark:text-slate-400">(for Requestor)</span></label>
        {{ form.office_department }}
        <p id="editUserErr_office_department" class="hidden text-xs text-red-600 dark:text-red-400 mt-1"></p>
    </div>
    <div>
        <label for="id_is_active" class="flex items-center gap-2 cursor-pointer">
            {{ form.is_active }}
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Active (user can log in)</span>
        </label>
    </div>
    <div class="border-t border-slate-200 dark:border-slate-700 pt-4 mt-4">
        <p class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-2">Change password (optional)</p>
        <div class="space-y-3">
            <div>
                <label class="block text-xs text-slate-500 dark:text-slate-400 mb-1">New password</label>
                {{ form.password1 }}
            </div>
            <div>
                <label class="block text-xs text-slate-500 dark:text-slate-400 mb-1">Confirm new password</label>
                {{ form.password2 }}
                <p id="editUserErr_password2" class="hidden text-xs text-red-600 dark:text-red-400 mt-1"></p>
            </div>
        </div>
    </div>
    <div class="flex justify-end gap-3 pt-2">
        <button type="button" id="editUserCancelBtn" class="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Cancel</button>
        <button type="submit" id="editUserSubmitBtn" class="inline-flex items-center gap-2 px-4 py-2 bg-primary hover:bg-primary/90 text-white text-sm font-semibold rounded-lg transition-colors" data-loading-text="Saving changes...">
            <span class="material-symbols-outlined text-base">save</span>
            Save changes
        </button>
    </div>
</form>
