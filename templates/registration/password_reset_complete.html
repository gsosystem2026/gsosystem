<!DOCTYPE html>
{% load static %}
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GSO - Password Reset Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet"/>
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        .bg-subtle-gradient { background: linear-gradient(135deg, #f0f4ff 0%, #f6f6f8 100%); }
        .dark .bg-subtle-gradient { background: linear-gradient(135deg, #101622 0%, #1a2333 100%); }
    </style>
</head>
<body class="bg-subtle-gradient dark:bg-background-dark min-h-screen flex flex-col font-display text-slate-900 dark:text-slate-100">
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-6 md:px-10 py-4">
    <div class="flex items-center gap-4 text-primary">
        <div class="size-10 bg-primary/10 rounded-lg flex items-center justify-center overflow-hidden">
            <img src="{% static 'img/logo/gso_logo.png' %}" alt="GSO logo" class="w-8 h-8 object-contain">
        </div>
        <span class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">GSO Request Management</span>
    </div>
    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Secured Portal</div>
</header>

<main class="flex-grow flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-primary/5 border border-slate-200 dark:border-slate-800 overflow-hidden">
        <div class="p-6 text-center">
            <span class="material-symbols-outlined text-primary text-4xl">task_alt</span>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white mt-3 mb-2">Password reset complete</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm">Your password has been updated successfully.</p>
            <a href="{% url 'gso_accounts:login' %}" class="mt-6 inline-flex items-center gap-2 text-sm font-semibold text-primary hover:underline">
                <span class="material-symbols-outlined text-[18px]">login</span>
                Log in now
            </a>
        </div>
    </div>
</main>
</body>
</html>
